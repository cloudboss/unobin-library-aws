name: docs

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: Version label for this build.
        required: true
        type: string

jobs:
  publish:
    permissions:
      contents: write
      id-token: write
    uses: cloudboss/cloudboss-docs/.github/workflows/docs.yml@v0.1.0
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.release.tag_name }}
      setup-go: true
      generate: make docs
